<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✓ Todo App Dashboard</h1>
            <p>Manage Your Tasks Efficiently</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="overview">Dashboard</button>
            <button class="tab-btn" data-tab="tasks">My Tasks</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </nav>

        <main>
            <!-- Dashboard Tab -->
            <section id="overview" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Tasks</h3>
                        <p class="stat-value" id="totalTasks">0</p>
                        <p class="stat-label">All tasks</p>
                    </div>
                    <div class="stat-card">
                        <h3>Completed</h3>
                        <p class="stat-value" id="completedTasks">0</p>
                        <p class="stat-label">Done</p>
                    </div>
                    <div class="stat-card">
                        <h3>Pending</h3>
                        <p class="stat-value" id="pendingTasks">0</p>
                        <p class="stat-label">To do</p>
                    </div>
                    <div class="stat-card">
                        <h3>Progress</h3>
                        <p class="stat-value" id="progressPercent">0%</p>
                        <p class="stat-label">Completion</p>
                    </div>
                </div>
            </section>

            <!-- Tasks Tab -->
            <section id="tasks" class="tab-content">
                <div class="tasks-section">
                    <h2>My Tasks</h2>
                    <div class="task-input">
                        <input type="text" id="taskInput" placeholder="Add a new task...">
                        <button onclick="addTask()">+ Add Task</button>
                    </div>
                    <ul id="taskList" class="task-list">
                        <li class="task-item">
                            <input type="checkbox">
                            <span>Complete project report</span>
                            <button class="delete-btn" onclick="deleteTask(this)">✕</button>
                        </li>
                        <li class="task-item">
                            <input type="checkbox" checked>
                            <span style="text-decoration: line-through;">Email important documents</span>
                            <button class="delete-btn" onclick="deleteTask(this)">✕</button>
                        </li>
                        <li class="task-item">
                            <input type="checkbox">
                            <span>Schedule meeting with team</span>
                            <button class="delete-btn" onclick="deleteTask(this)">✕</button>
                        </li>
                    </ul>
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="settings" class="tab-content">
                <div class="settings-section">
                    <h2>Settings</h2>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" checked>
                            Enable task notifications
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" checked>
                            Dark mode
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" checked>
                            Show daily reminders
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            Theme:
                            <select>
                                <option>Blue</option>
                                <option>Purple</option>
                                <option>Green</option>
                            </select>
                        </label>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Todo App Dashboard | Version 1.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
